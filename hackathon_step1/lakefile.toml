name = "hackathon_step1"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["HackathonStep1"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0-rc2"

[[lean_lib]]
name = "HackathonStep1"

[[lean_lib]]
name = "HackathonStep2"

[[lean_lib]]
name = "HackathonStep3"
